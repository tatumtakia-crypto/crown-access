<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Crown Access Dispatch Academy</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#080808',
                        brandCard: '#121212',
                        brandBorder: '#222222',
                    }
                }
            }
        }
    </script>
    <style>
        .metallic-gold-text {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .metallic-blue-text {
            background: linear-gradient(135deg, #1d4ed8 0%, #93c5fd 35%, #2563eb 60%, #eff6ff 80%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .metallic-card {
            background: linear-gradient(145deg, #161616 0%, #0d0d0d 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.15);
        }
        .shine-button-gold {
            background: linear-gradient(135deg, #bf953f 0%, #e6ca65 50%, #aa771c 100%);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }
        .shine-button-gold:hover {
            background: linear-gradient(135deg, #fcf6ba 0%, #bf953f 50%, #d4af37 100%);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="bg-brandDark text-gray-100 font-sans antialiased min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="border-b border-gray-800/80 bg-brandDark/95 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="w-11 h-11 bg-gradient-to-br from-blue-600 via-gray-900 to-yellow-600 rounded-xl p-[2px] shadow-lg flex items-center justify-center shrink-0">
                    <div class="w-full h-full bg-brandDark rounded-[10px] flex items-center justify-center font-black text-xl">
                        <span class="metallic-blue-text font-serif italic">C</span><span class="metallic-gold-text font-serif italic">A</span>
                    </div>
                </div>
                <div>
                    <span class="block text-[10px] uppercase tracking-widest metallic-gold-text font-bold">Crown Access</span>
                    <span class="text-sm font-black text-white">Student Portal</span>
                </div>
            </a>
            <a href="index.html" class="text-xs font-semibold text-gray-400 hover:text-white transition">&larr; Back to Home</a>
        </div>
    </header>

    <!-- Main Login Form Area -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full metallic-card rounded-3xl p-8 sm:p-10 shadow-2xl relative">
            <div class="text-center mb-8">
                <h1 class="text-2xl sm:text-3xl font-black text-white mb-2">Student Sign In</h1>
                <p class="text-xs sm:text-sm text-gray-400">Enter your credentials to access your portal and live classes.</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs uppercase font-bold tracking-wider text-gray-400 mb-2">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-black border border-gray-800 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-yellow-500 transition" placeholder="student@example.com">
                </div>

                <div>
                    <label class="block text-xs uppercase font-bold tracking-wider text-gray-400 mb-2">Password</label>
                    <input type="password" id="password" required class="w-full bg-black border border-gray-800 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-yellow-500 transition" placeholder="••••••••">
                </div>

                <div id="error-msg" class="hidden bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-xs text-red-400 font-medium text-center"></div>

                <button type="submit" id="login-btn" class="w-full shine-button-gold text-black font-extrabold py-3.5 rounded-xl transition text-sm tracking-wide cursor-pointer">
                    Sign In to Portal
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 px-6 border-t border-gray-800 text-center text-xs text-gray-500 bg-brandDark">
        <p>&copy; 2026 Crown Access. All rights reserved.</p>
    </footer>

    <!-- Safe Authentication Script -->
    <script>
        const SUPABASE_URL = 'https://thzbqlumohwlxgbodopf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoemJxbHVtb2h3bHhnYm9kb3BmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2Mzg1MDMsImV4cCI6MjEwMDIxNDUwM30.oaLH3NqWFdAvzHm3PGyXMgxo4cFfF4BRSPTR90JcLOM';
        
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: { persistSession: true, autoRefreshToken: true }
            });
        } catch (e) {
            console.error("Supabase initialization error:", e);
        }

        // Check active session on load
        window.onload = async function() {
            if (!supabaseClient) return;
            try {
                const { data } = await supabaseClient.auth.getSession();
                if (data && data.session) {
                    window.location.replace('portal.html');
                }
            } catch (err) {
                console.error("Session check error:", err);
            }
        };

        // Handle Form Submission
        const loginForm = document.getElementById('login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const emailInput = document.getElementById('email');
                const passwordInput = document.getElementById('password');
                const errorDiv = document.getElementById('error-msg');
                const loginBtn = document.getElementById('login-btn');

                if (!emailInput || !passwordInput) return;

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (errorDiv) errorDiv.classList.add('hidden');
                if (loginBtn) {
                    loginBtn.textContent = 'Authenticating...';
                    loginBtn.disabled = true;
                }

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.replace('portal.html');
                } catch (err) {
                    if (errorDiv) {
                        errorDiv.textContent = err.message || 'Invalid login credentials. Please try again.';
                        errorDiv.classList.remove('hidden');
                    }
                    if (loginBtn) {
                        loginBtn.textContent = 'Sign In to Portal';
                        loginBtn.disabled = false;
                    }
                }
            });
        }
    </script>
</body>
</html>
