<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login | Crown Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#080808',
                        brandCard: '#121212',
                        brandBorder: '#222222',
                    }
                }
            }
        }
    </script>
    <style>
        .metallic-gold-text {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8));
        }
        .metallic-blue-text {
            background: linear-gradient(135deg, #1d4ed8 0%, #93c5fd 35%, #2563eb 60%, #eff6ff 80%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8));
        }
        .metallic-card-gold {
            background: linear-gradient(145deg, #161616 0%, #0d0d0d 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.15);
        }
        .shine-button-gold {
            background: linear-gradient(135deg, #bf953f 0%, #e6ca65 50%, #aa771c 100%);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }
        .shine-button-gold:hover {
            background: linear-gradient(135deg, #fcf6ba 0%, #bf953f 50%, #d4af37 100%);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="bg-brandDark text-gray-100 font-sans antialiased min-h-screen flex flex-col justify-between selection:bg-yellow-500 selection:text-black">

    <!-- Header / Navigation -->
    <header class="border-b border-gray-800/80 bg-brandDark/95 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="w-14 h-14 bg-gradient-to-br from-blue-600 via-gray-900 to-yellow-600 rounded-xl p-[2px] shadow-lg shadow-blue-900/30 flex items-center justify-center">
                    <div class="w-full h-full bg-brandDark rounded-[10px] flex items-center justify-center font-black text-xl tracking-tighter">
                        <span class="metallic-blue-text font-serif italic text-2xl">C</span><span class="metallic-gold-text font-serif italic text-2xl">A</span>
                    </div>
                </div>
                <div>
                    <span class="block text-xs uppercase tracking-widest metallic-gold-text font-bold">Crown Access</span>
                    <span class="text-xl md:text-2xl font-black tracking-tight text-white drop-shadow">Student Gateway</span>
                </div>
            </div>
            <nav class="flex items-center space-x-8 text-sm font-semibold text-gray-300">
                <a href="index.html" class="hover:text-yellow-400 transition">&larr; Back to Home</a>
            </nav>
        </div>
    </header>

    <!-- Login Form Section -->
    <section class="py-28 px-6 flex-grow flex items-center justify-center relative">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[300px] bg-yellow-600/10 blur-[130px] rounded-full pointer-events-none"></div>

        <div class="max-w-md w-full metallic-card-gold p-8 md:p-10 rounded-3xl relative z-10">
            <div class="text-center mb-8">
                <span class="text-xs uppercase tracking-widest metallic-gold-text font-bold block mb-2">Secure Academy Portal</span>
                <h1 class="text-3xl font-black text-white">Student Sign In</h1>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-400 font-bold mb-2">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-black border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 transition">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-400 font-bold mb-2">Password</label>
                    <input type="password" id="password" required class="w-full bg-black border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 transition">
                </div>
                <button type="submit" id="submit-btn" class="w-full shine-button-gold text-black font-extrabold py-4 rounded-xl transition text-base tracking-wide">
                    Sign In to Portal
                </button>
            </form>

            <div id="error-msg" class="mt-4 text-red-400 text-sm text-center font-medium hidden"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-12 px-6 border-t border-gray-800 text-center text-sm text-gray-500 bg-brandDark">
        <p class="mb-2 font-medium">&copy; 2026 Crown Access. All rights reserved.</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://egvkpmtrrqewfsajrvev.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FWMDx5S8xxcInYttVbEsTQ_ujFyDLau';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkExistingSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'portal.html';
            }
        }
        checkExistingSession();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');

            submitBtn.textContent = 'Authenticating...';
            submitBtn.disabled = true;
            errorDiv.classList.add('hidden');

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                submitBtn.textContent = 'Sign In to Portal';
                submitBtn.disabled = false;
            } else {
                window.location.href = 'portal.html';
            }
        });
    </script>
</body>
</html>
