<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Video Room</title>
    
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .video-wrapper {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { 
            margin-top: 0; 
            color: #111827; 
            font-size: 1.25rem;
        }
        #video-container {
            width: 100%;
            height: 600px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background-color: #f9fafb;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
        }
        .controls { 
            display: flex; 
            gap: 12px; 
        }
        button {
            padding: 10px 20px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #dc2626; }
        .btn-danger:hover { background-color: #b91c1c; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <h2>Live Room</h2>
        
        <div id="video-container">
            <span>Video will appear here when you join</span>
        </div>
        
        <div class="controls">
            <button onclick="joinRoom()">Join Call</button>
            <button onclick="leaveRoom()" class="btn-danger">Leave Call</button>
        </div>
    </div>

    <script>
        let callFrame;

        function joinRoom() {
            if (callFrame) return;

            const container = document.getElementById('video-container');
            container.innerHTML = ''; 

            callFrame = window.DailyIframe.createFrame(container, {
                iframeStyle: {
                    width: '100%',
                    height: '100%',
                    border: 'none',
                    borderRadius: '6px'
                }
            });

            // Your specific room link is now active here
            callFrame.join({ url: 'https://blacklabelacademy.daily.co/Acquisition' });
        }

        function leaveRoom() {
            if (callFrame) {
                callFrame.leave();
                callFrame.destroy();
                callFrame = null;
                
                document.getElementById('video-container').innerHTML = '<span>Video will appear here when you join</span>';
            }
        }
    </script>
</body>
</html>
